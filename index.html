<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#ffffff;
    color:#161616;
    font-family:'Inter',-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;padding:64px 24px 60px;}

  h1{
    font-size:20px;
    font-weight:600;
    letter-spacing:-0.01em;
    margin:0 0 24px;
  }

  ul{
    list-style:none;
    margin:0;
    padding:0;
  }
  li{
    padding:10px 0;
    border-bottom:1px solid #ececec;
    font-size:15px;
  }
  li:last-child{ border-bottom:none; }
  li a{
    color:#161616;
    text-decoration:none;
    font-weight:500;
  }
  li a:hover{ color:#2f6fed; }
  li .sep{ color:#c8c8c8; padding:0 6px; }
  li .item{ color:#8a8a8a; }

  .empty, .error-box{
    font-size:14px;
    color:#8a8a8a;
    padding:10px 0;
  }
  .error-box a{ color:#2f6fed; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Tools</h1>
  <ul id="catalog"></ul>
</div>

<script>
(function(){
  // ---- configure this for your repo ----
  var OWNER = "sseoyi";
  var REPO = "tools";
  var BRANCH = "main";
  var TOOLS_PATH = "tools";
  // ---------------------------------------

  var catalogEl = document.getElementById('catalog');

  function apiUrl(path){
    return 'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + path + '?ref=' + BRANCH;
  }
  function pagesUrl(path){
    return './' + path;
  }
  function titleCase(slug){
    return slug.replace(/[-_]+/g,' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }

  fetch(apiUrl(TOOLS_PATH))
    .then(function(r){
      if(!r.ok){ throw new Error(r.status === 404 ? 'no "' + TOOLS_PATH + '" folder found yet' : 'GitHub API returned ' + r.status); }
      return r.json();
    })
    .then(function(items){
      var folders = items.filter(function(i){ return i.type === 'dir'; }).sort(function(a,b){ return a.name.localeCompare(b.name); });
      if(folders.length === 0){
        catalogEl.innerHTML = '<li class="empty">No tools yet.</li>';
        return;
      }
      return Promise.all(folders.map(function(folder){
        return fetch(apiUrl(TOOLS_PATH + '/' + folder.name))
          .then(function(r){ return r.ok ? r.json() : []; })
          .then(function(contents){
            var htmlFiles = contents.filter(function(f){ return f.type === 'file' && /\.html?$/i.test(f.name); })
              .sort(function(a,b){
                if(a.name.toLowerCase() === 'index.html') return -1;
                if(b.name.toLowerCase() === 'index.html') return 1;
                return a.name.localeCompare(b.name);
              });
            return { name: folder.name, path: folder.path, files: htmlFiles };
          });
      })).then(function(groups){
        groups = groups.filter(function(g){ return g.files.length > 0; });
        renderCatalog(groups);
      });
    })
    .catch(function(err){
      catalogEl.innerHTML =
        '<li class="error-box">Could not load the list (' + escapeHtml(err.message) + '). ' +
        'Browse tools directly at <a href="https://github.com/' + OWNER + '/' + REPO + '/tree/' + BRANCH + '/' + TOOLS_PATH + '" target="_blank" rel="noopener">' +
        'github.com/' + OWNER + '/' + REPO + '/tree/' + BRANCH + '/' + TOOLS_PATH + '</a>.</li>';
    });

  function renderCatalog(groups){
    if(groups.length === 0){
      catalogEl.innerHTML = '<li class="empty">No tools yet.</li>';
      return;
    }
    var html = '';
    groups.forEach(function(group){
      group.files.forEach(function(file){
        var link = pagesUrl(group.path + '/' + file.name);
        var label = file.name.toLowerCase() === 'index.html' ? titleCase(group.name) : titleCase(file.name.replace(/\.html?$/i,''));
        html += '<li><a href="' + link + '">' + escapeHtml(label) + '</a><span class="sep">&mdash;</span><span class="item">' + escapeHtml(group.path + '/' + file.name) + '</span></li>';
      });
    });
    catalogEl.innerHTML = html;
  }
})();
</script>
</body>
</html>
