<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#060610">
  <title>The Murmuring Orb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#f4efff;--violet:#b890ff;--cyan:#9de8ff;--ease:cubic-bezier(.22,.78,.2,1)}
    *{box-sizing:border-box}html,body{height:100%}
    body{margin:0;overflow:hidden;color:var(--ink);font-family:Georgia,"Times New Roman",serif;background:#05050d;isolation:isolate}
    body:before{content:"";position:fixed;inset:-20%;z-index:-5;background:radial-gradient(ellipse at 50% 68%,#25163a 0,transparent 34%),radial-gradient(ellipse at 20% 20%,#11142b 0,transparent 42%),linear-gradient(#05050d,#090713 60%,#10091b);animation:skyBreath 12s ease-in-out infinite alternate}
    .stars,.stars:before,.stars:after{position:fixed;inset:0;z-index:-4;content:"";background-image:radial-gradient(circle,#fff 0 1px,transparent 1.4px);background-size:91px 91px;opacity:.24}
    .stars:before{transform:translate(31px,17px);background-size:137px 137px;opacity:.45}.stars:after{transform:translate(-13px,44px);background-size:211px 211px;filter:blur(.4px)}
    .mist{position:fixed;left:-30vw;width:160vw;height:30vh;bottom:-4vh;z-index:-3;background:radial-gradient(ellipse,rgba(158,116,204,.14),transparent 66%);filter:blur(34px);animation:drift 20s ease-in-out infinite alternate}
    main{height:100%;min-height:460px;display:grid;place-content:center;justify-items:center;padding:24px}
    .stage{position:relative;width:min(76vw,560px);aspect-ratio:1;perspective:1100px;filter:drop-shadow(0 28px 45px rgba(0,0,0,.7))}
    .aura{position:absolute;inset:4%;border-radius:50%;background:radial-gradient(circle,rgba(174,111,255,.22),rgba(90,65,185,.07) 54%,transparent 72%);filter:blur(22px);animation:breathe 6s ease-in-out infinite;pointer-events:none}
    button.ball{position:absolute;inset:9%;width:82%;height:82%;border:0;border-radius:50%;padding:0;color:inherit;background:transparent;cursor:pointer;outline:none;-webkit-tap-highlight-color:transparent;transform-style:preserve-3d}
    .ball:focus-visible{outline:1px solid rgba(213,191,255,.8);outline-offset:13px}
    .glass{position:absolute;inset:0;border-radius:50%;overflow:hidden;transform-style:preserve-3d;backface-visibility:visible;will-change:transform,opacity;background:radial-gradient(circle at 48% 49%,rgba(42,20,66,.2) 0 35%,rgba(107,76,148,.16) 57%,rgba(209,190,255,.22) 78%,rgba(26,18,54,.65) 100%);box-shadow:inset 0 0 30px rgba(222,221,255,.26),inset -28px -38px 65px rgba(18,6,38,.85),inset 24px 17px 42px rgba(166,217,255,.18),0 0 7px rgba(230,218,255,.75),0 0 36px rgba(139,78,255,.25)}
    .glass:before{content:"";position:absolute;inset:2%;border-radius:50%;background:radial-gradient(ellipse at 34% 22%,rgba(255,255,255,.72) 0 1.5%,rgba(216,238,255,.19) 8%,transparent 22%),linear-gradient(125deg,transparent 29%,rgba(255,255,255,.08) 35%,transparent 44%);filter:blur(.2px)}
    .glass:after{content:"";position:absolute;left:19%;top:10%;width:25%;height:9%;border-radius:50%;transform:rotate(-24deg);background:rgba(255,255,255,.23);filter:blur(7px)}
    .inner-fog{position:absolute;inset:19%;border-radius:50%;background:radial-gradient(ellipse at 20% 55%,rgba(181,142,255,.2),transparent 54%),radial-gradient(ellipse at 80% 45%,rgba(108,213,255,.14),transparent 58%);filter:blur(18px);animation:fog 9s ease-in-out infinite alternate;pointer-events:none;will-change:transform,filter}
    .dust{position:absolute;inset:10%;border-radius:50%;overflow:hidden;pointer-events:none;will-change:transform,filter}.speck{position:absolute;width:2px;height:2px;border-radius:50%;background:#e9deff;box-shadow:0 0 6px #d2baff;opacity:.5;animation:float var(--d) ease-in-out infinite alternate;animation-delay:var(--delay)}
    .fortune{position:absolute;inset:23%;z-index:3;display:grid;place-items:center;text-align:center;font-family:"Instrument Serif",Georgia,serif;font-weight:400;font-style:normal;font-size:clamp(18px,2.55vw,28px);line-height:1.3;letter-spacing:.018em;text-wrap:balance;text-shadow:0 1px 12px #11071e,0 0 22px rgba(196,159,255,.44);pointer-events:none;will-change:opacity,transform,filter}
    .hint{position:absolute;left:50%;bottom:14%;transform:translateX(-50%);font:10px/1.2 system-ui,sans-serif;letter-spacing:.22em;color:rgba(234,222,255,.42);white-space:nowrap;transition:opacity .5s ease}.has-fortune .hint{opacity:0}
    .dust-shuffle{animation:dustShuffle 1s ease-in-out both}.gradient-shift{animation:gradientShift 1.5s ease-in-out}.text-out{animation:textOut .55s ease forwards}.text-in{animation:textIn 1.45s var(--ease) both}
    .mode-fade{animation:modeFade .9s ease}.selector{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:clamp(46px,8vh,76px);z-index:5;font:600 clamp(8px,1.5vw,10px)/1 system-ui,sans-serif;letter-spacing:.13em;color:rgba(223,211,241,.5)}
    .mode{appearance:none;border:0;background:transparent;color:inherit;font:inherit;letter-spacing:inherit;padding:8px 10px;border-radius:999px;cursor:pointer;transition:color .45s ease,background .45s ease,box-shadow .45s ease}.mode:hover{color:rgba(245,238,255,.86)}.mode.active{color:#f5efff;background:rgba(184,144,255,.11);box-shadow:inset 0 0 0 1px rgba(220,198,255,.19),0 0 18px rgba(148,89,255,.17)}.divider{opacity:.28}
    /* No spatial movement during a change: dust swaps and color softly breathes. */
    @keyframes dustShuffle{0%,100%{opacity:1;filter:blur(0)}48%{opacity:.08;filter:blur(2px)}52%{opacity:.08;filter:blur(2px)}}
    @keyframes gradientShift{0%,100%{filter:blur(18px) hue-rotate(0deg) brightness(1)}50%{filter:blur(19px) hue-rotate(7deg) brightness(1.09)}}
    @keyframes textOut{to{opacity:0;filter:blur(2.5px);transform:translateY(-5px)}}
    @keyframes textIn{0%{opacity:0;filter:blur(2.5px);transform:translateY(8px) rotate(-1deg)}35%{opacity:.48;filter:blur(1.2px);transform:translateY(-2px) rotate(.65deg)}58%{opacity:.75;transform:translateY(1px) rotate(-.38deg)}78%{opacity:.92;filter:blur(.3px);transform:translateY(-.5px) rotate(.16deg)}100%{opacity:1;filter:blur(0);transform:none}}
    @keyframes modeFade{50%{opacity:.7}}@keyframes breathe{0%,100%{transform:scale(.97);opacity:.65}50%{transform:scale(1.04);opacity:1}}@keyframes fog{to{transform:translate(7%,-3%) scale(1.08) rotate(5deg)}}@keyframes float{to{transform:translate(var(--x),calc(var(--y) * -1));opacity:.85}}@keyframes drift{to{transform:translateX(14vw) scale(1.08)}}@keyframes skyBreath{to{filter:brightness(1.13)}}
    @media(max-height:620px){.stage{width:min(56vh,390px)}.selector{margin-top:32px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <div class="stars"></div><div class="mist"></div>
  <main>
    <div class="stage" id="stage">
      <div class="aura"></div>
      <button class="ball" id="ball" aria-label="Reveal a new fortune">
        <div class="glass" id="glass"><div class="inner-fog"></div><div class="dust" id="dust"></div></div>
        <div class="fortune" id="fortune" aria-live="polite"></div>
        <div class="hint">TOUCH THE ORB</div>
      </button>
    </div>
    <nav class="selector" aria-label="Fortune mode">
      <button class="mode active" data-mode="fact">FACT</button><span class="divider">|</span>
      <button class="mode" data-mode="rather">WOULD YOU RATHER</button><span class="divider">|</span>
      <button class="mode" data-mode="encourage">ENCOURAGE</button>
    </nav>
  </main>
  <script>
    // Compact offline fortune library; every choice is made locally.
    const fortunes={
      fact:["Bananas are berries. Strawberries are not.","A cloud can weigh more than a million pounds.","Octopuses have three hearts and no mortgage.","Wombat droppings are cube-shaped.","A group of flamingos is called a flamboyance.","Sharks existed before trees.","Your skeleton is always slightly wet.","Scotland's national animal is the unicorn.","Some turtles breathe through their backsides.","A snail can nap for three years."],
      rather:["Would you rather find free cake—or step on a rake?","Would you rather gain great fame—or lose every game?","Would you rather get paid—or be mildly betrayed?","Would you rather fly with grace—or smell like old lace?","Would you rather glow at night—or lose every fight?","Would you rather own a throne—or lick a cold stone?","Would you rather sleep till noon—or argue with the moon?","Would you rather have perfect hair—or fight one angry bear?"],
      encourage:["You have survived every bad day so far. Suspiciously impressive.","Keep going. Spite is renewable energy.","The void believes in you. Its standards are unclear.","You can do this. Panic later; schedule it.","Be the plot twist your problems did not budget for.","Rest if you must. Even villains need a dramatic pause.","Your chaos has excellent long-term potential.","Today is temporary. So is that awkward thing you said.","Rise and shine. Or rise and brood productively.","The bar is low. Step over it with theatrical confidence."]
    };
    const ball=document.querySelector('#ball'),glass=document.querySelector('#glass'),text=document.querySelector('#fortune'),stage=document.querySelector('#stage');
    let mode='fact',busy=false,last=-1;
    // Build lightweight particles once; CSS handles their movement at compositor speed.
    const dust=document.querySelector('#dust');
    for(let i=0;i<26;i++){const s=document.createElement('i');s.className='speck';const a=Math.random()*Math.PI*2,r=Math.sqrt(Math.random())*43;s.style.cssText=`left:${50+Math.cos(a)*r}%;top:${50+Math.sin(a)*r}%;--d:${4+Math.random()*6}s;--delay:${-Math.random()*8}s;--x:${-10+Math.random()*20}px;--y:${6+Math.random()*17}px`;dust.append(s)}
    function pick(){const list=fortunes[mode];let i;do{i=Math.floor(Math.random()*list.length)}while(i===last&&list.length>1);last=i;return list[i]}
    function restart(el,name){el.classList.remove(name);void el.offsetWidth;el.classList.add(name)}
    function reveal(){if(busy)return;busy=true;stage.classList.add('has-fortune');const fresh=pick(),has=!!text.textContent;
      if(!has){text.textContent=fresh;restart(text,'text-in');setTimeout(()=>busy=false,700);return}
      restart(text,'text-out');
      // Replace the dust arrangement at its nearly invisible midpoint.
      const fog=document.querySelector('.inner-fog');
      restart(dust,'dust-shuffle');restart(fog,'gradient-shift');
      setTimeout(()=>dust.querySelectorAll('.speck').forEach(s=>{const a=Math.random()*Math.PI*2,r=Math.sqrt(Math.random())*43;s.style.left=`${50+Math.cos(a)*r}%`;s.style.top=`${50+Math.sin(a)*r}%`}),500);
      // At 500ms both layers are hidden: swap them, then reveal them together.
      setTimeout(()=>{text.textContent=fresh;text.classList.remove('text-out');restart(text,'text-in')},500);
      setTimeout(()=>{dust.classList.remove('dust-shuffle');fog.classList.remove('gradient-shift')},1500);
      setTimeout(()=>{busy=false},2170)
    }
    ball.addEventListener('click',reveal);
    document.querySelectorAll('.mode').forEach(btn=>btn.addEventListener('click',()=>{if(btn.dataset.mode===mode||busy)return;mode=btn.dataset.mode;last=-1;document.querySelector('.mode.active').classList.remove('active');btn.classList.add('active');restart(ball,'mode-fade');setTimeout(reveal,150)}));
  </script>
</body>
</html>
